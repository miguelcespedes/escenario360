name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Prepare output folder
        run: mkdir -p output

      - name: Copy APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk output/stage360-debug.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage360-debug-apk
          path: output/stage360-debug.apk
