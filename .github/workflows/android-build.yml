name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Read app version
        run: echo "APP_VERSION=$(node -p \"require('./package.json').version\")" >> $GITHUB_ENV

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease

      - name: Prepare output folder
        run: mkdir -p output

      - name: Copy release APK with versioned name
        run: cp android/app/build/outputs/apk/release/app-release.apk output/stage360-v${APP_VERSION}-release.apk

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage360-release-apk
          path: output/stage360-v${APP_VERSION}-release.apk
